name: Deploy JagdSchießen

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy auf Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # Alle Instanzen dieses Repos auf dem Server finden und updaten
            for dir in /opt/kruempelmann/*/; do
              if git -C "$dir" remote get-url origin 2>/dev/null | grep -q "AnmeldungDJV"; then
                echo "→ Update: $dir"
                git -C "$dir" pull origin main
                docker compose -f "${dir}docker-compose.yml" build
                docker compose -f "${dir}docker-compose.yml" up -d
                echo "✓ $dir deployed"
              fi
            done
            docker image prune -f
